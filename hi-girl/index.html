<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script src="gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      background: #050302;
    }
    #root {
      position: relative;
      width: 1080px;
      height: 1920px;
      background: #050302;
    }

    /* Sky / ambient gradient */
    #bg {
      position: absolute; top: 0; left: 0; width: 1080px; height: 1920px;
      background:
        radial-gradient(ellipse 120% 55% at 50% 0%,   rgba(28,14,6,1)   0%, transparent 70%),
        radial-gradient(ellipse 180% 45% at 50% 100%,  rgba(60,28,8,1)   0%, transparent 65%),
        linear-gradient(180deg, #0A0503 0%, #160A04 25%, #22100500 55%, #2A1406 85%, #0C0602 100%);
    }

    /* Bokeh layer */
    #bk { position: absolute; top: 0; left: 0; width: 1080px; height: 1920px; z-index: 4; }
    .b { position: absolute; border-radius: 50%; }

    /* Vignette */
    #vig {
      position: absolute; top: 0; left: 0; width: 1080px; height: 1920px; z-index: 80;
      background: radial-gradient(ellipse 75% 80% at 50% 48%, transparent 38%, rgba(0,0,0,0.72) 100%);
      pointer-events: none;
    }

    /* Film grain overlay */
    #grain {
      position: absolute; top: 0; left: 0; width: 1080px; height: 1920px; z-index: 88;
      opacity: 0.055; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }

    /* Portrait wrapper — centered, upper 2/3 of frame */
    #portrait {
      position: absolute;
      top: 60px; left: 50%;
      transform: translateX(-50%);
      width: 960px; height: 1440px;
      z-index: 10;
    }

    /* Chromatic fringe overlay (tiny, cinematic) */
    #portrait::after {
      content: '';
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(ellipse 50% 60% at 50% 42%,
        transparent 60%, rgba(180,160,255,0.04) 80%, rgba(255,140,80,0.04) 100%);
      pointer-events: none;
    }

    /* "Hi" caption */
    #cap {
      position: absolute;
      bottom: 260px; left: 0; width: 1080px;
      text-align: center;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 100px;
      color: #FFFFFF;
      letter-spacing: 3px;
      text-shadow: 0 3px 28px rgba(0,0,0,0.85);
      opacity: 0; visibility: hidden;
      z-index: 95;
    }
  </style>
</head>
<body>
<div id="root" data-composition-id="main" data-width="1080" data-height="1920" data-start="0" data-duration="3.2">

  <div id="bg"></div>

  <!-- ── BOKEH ── -->
  <div id="bk">
    <!-- large soft glows — street ambience -->
    <div class="b" id="b1"  style="width:380px;height:380px;top:60px; left:-80px;  background:rgba(255,170,40,0.15);filter:blur(70px);"></div>
    <div class="b" id="b2"  style="width:300px;height:300px;top:120px;left:790px;  background:rgba(255,200,60,0.13);filter:blur(60px);"></div>
    <div class="b" id="b3"  style="width:260px;height:260px;top:40px; left:380px;  background:rgba(210,140,50,0.09);filter:blur(75px);"></div>
    <div class="b" id="b4"  style="width:340px;height:340px;top:1380px;left:-60px; background:rgba(255,150,30,0.14);filter:blur(65px);"></div>
    <div class="b" id="b5"  style="width:280px;height:280px;top:1500px;left:810px; background:rgba(255,190,50,0.11);filter:blur(55px);"></div>
    <!-- medium bokeh — street lights -->
    <div class="b" id="b6"  style="width:130px;height:130px;top:90px; left:70px;   background:rgba(255,225,120,0.50);filter:blur(26px);"></div>
    <div class="b" id="b7"  style="width:110px;height:110px;top:210px;left:890px;  background:rgba(255,210,90,0.44);filter:blur(22px);"></div>
    <div class="b" id="b8"  style="width:90px; height:90px; top:55px; left:590px;  background:rgba(255,248,160,0.55);filter:blur(18px);"></div>
    <div class="b" id="b9"  style="width:100px;height:100px;top:310px;left:140px;  background:rgba(255,200,80,0.38);filter:blur(20px);"></div>
    <div class="b" id="b10" style="width:80px; height:80px; top:440px;left:930px;  background:rgba(255,238,130,0.48);filter:blur(15px);"></div>
    <!-- cool / blue bokeh (shop windows, sky) -->
    <div class="b" id="b11" style="width:70px; height:70px; top:130px;left:460px;  background:rgba(170,190,255,0.32);filter:blur(14px);"></div>
    <div class="b" id="b12" style="width:55px; height:55px; top:270px;left:710px;  background:rgba(150,180,255,0.28);filter:blur(11px);"></div>
    <div class="b" id="b13" style="width:48px; height:48px; top:380px;left:310px;  background:rgba(180,210,255,0.30);filter:blur(10px);"></div>
    <!-- tiny sparkles -->
    <div class="b" id="b14" style="width:38px; height:38px; top:100px;left:215px;  background:rgba(255,252,200,0.70);filter:blur(7px);"></div>
    <div class="b" id="b15" style="width:32px; height:32px; top:195px;left:760px;  background:rgba(255,245,180,0.65);filter:blur(6px);"></div>
    <div class="b" id="b16" style="width:28px; height:28px; top:360px;left:490px;  background:rgba(255,255,220,0.72);filter:blur(5px);"></div>
    <div class="b" id="b17" style="width:22px; height:22px; top:480px;left:170px;  background:rgba(255,255,200,0.68);filter:blur(4px);"></div>
    <!-- ground / street warm base -->
    <div class="b" id="b18" style="width:700px;height:320px;top:1620px;left:190px; background:rgba(70,30,5,0.55);filter:blur(90px);"></div>
    <div class="b" id="b19" style="width:460px;height:180px;top:1740px;left:80px;  background:rgba(110,45,8,0.38);filter:blur(70px);"></div>
  </div>

  <!-- ── PORTRAIT SVG ── -->
  <div id="portrait">
    <svg viewBox="0 0 960 1440" xmlns="http://www.w3.org/2000/svg" width="960" height="1440">
      <defs>
        <!-- Face: warm, key-lit from slightly above-right -->
        <radialGradient id="faceBase" cx="52%" cy="35%" r="58%">
          <stop offset="0%"   stop-color="#FDECD4"/>
          <stop offset="35%"  stop-color="#F2CAAA"/>
          <stop offset="70%"  stop-color="#D9A87E"/>
          <stop offset="100%" stop-color="#B87E52"/>
        </radialGradient>
        <!-- Key light: bright top-right -->
        <radialGradient id="keyLt" cx="68%" cy="18%" r="52%">
          <stop offset="0%"   stop-color="rgba(255,248,230,0.50)"/>
          <stop offset="100%" stop-color="rgba(255,248,230,0)"/>
        </radialGradient>
        <!-- Fill light: soft left -->
        <radialGradient id="fillLt" cx="10%" cy="45%" r="55%">
          <stop offset="0%"   stop-color="rgba(200,220,255,0.14)"/>
          <stop offset="100%" stop-color="rgba(200,220,255,0)"/>
        </radialGradient>
        <!-- Neck -->
        <radialGradient id="neckG" cx="50%" cy="10%" r="75%">
          <stop offset="0%"   stop-color="#EEC898"/>
          <stop offset="100%" stop-color="#C08858"/>
        </radialGradient>
        <!-- Iris (brown) -->
        <radialGradient id="irisG" cx="38%" cy="32%" r="62%">
          <stop offset="0%"   stop-color="#7A4E28"/>
          <stop offset="55%"  stop-color="#3E2010"/>
          <stop offset="100%" stop-color="#180A04"/>
        </radialGradient>
        <!-- Hair -->
        <linearGradient id="hairG" x1="0%" y1="0%" x2="10%" y2="100%">
          <stop offset="0%"   stop-color="#110804"/>
          <stop offset="50%"  stop-color="#241208"/>
          <stop offset="100%" stop-color="#341A0A"/>
        </linearGradient>
        <!-- Lips -->
        <radialGradient id="lipG" cx="50%" cy="28%" r="58%">
          <stop offset="0%"   stop-color="#EFA0A0"/>
          <stop offset="55%"  stop-color="#D07878"/>
          <stop offset="100%" stop-color="#A85C5C"/>
        </radialGradient>
        <!-- Shoulder/clavicle area -->
        <radialGradient id="shouldG" cx="50%" cy="0%" r="85%">
          <stop offset="0%"   stop-color="#D8986A"/>
          <stop offset="100%" stop-color="#8C4E22"/>
        </radialGradient>
        <!-- Soft blur filter -->
        <filter id="soft"><feGaussianBlur stdDeviation="0.6"/></filter>
        <!-- Eye lash filter -->
        <filter id="lash"><feGaussianBlur stdDeviation="0.9"/></filter>
        <!-- Skin subsurface scattering hint -->
        <filter id="sss">
          <feGaussianBlur stdDeviation="4" result="blur"/>
          <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
      </defs>

      <!-- ══ SHOULDERS / CHEST ══ -->
      <ellipse cx="480" cy="1390" rx="440" ry="200" fill="url(#shouldG)" opacity="0.85"/>
      <!-- Dark clothing -->
      <ellipse cx="480" cy="1430" rx="420" ry="185" fill="#0D0806"/>

      <!-- ══ NECK ══ -->
      <rect x="418" y="980" width="124" height="240" rx="46" fill="url(#neckG)"/>
      <!-- Neck side shadows -->
      <ellipse cx="416" cy="1060" rx="22" ry="72" fill="rgba(90,45,12,0.35)"/>
      <ellipse cx="544" cy="1060" rx="22" ry="72" fill="rgba(90,45,12,0.35)"/>
      <!-- Neck highlight center -->
      <ellipse cx="480" cy="1020" rx="28" ry="55" fill="rgba(255,235,200,0.14)" filter="url(#soft)"/>

      <!-- ══ HAIR (BACK — behind face) ══ -->
      <ellipse cx="480" cy="430" rx="345" ry="530" fill="url(#hairG)"/>

      <!-- ══ FACE ══ -->
      <!-- Subtle subsurface warmth bleed below jaw -->
      <ellipse cx="480" cy="820" rx="220" ry="60" fill="rgba(220,130,60,0.18)" filter="url(#soft)"/>
      <!-- Face base shape -->
      <ellipse cx="480" cy="510" rx="252" ry="320" fill="url(#faceBase)"/>
      <!-- Key light overlay -->
      <ellipse cx="480" cy="510" rx="252" ry="320" fill="url(#keyLt)"/>
      <!-- Fill light overlay -->
      <ellipse cx="480" cy="510" rx="252" ry="320" fill="url(#fillLt)"/>

      <!-- Cheek blush -->
      <ellipse cx="320" cy="590" rx="62" ry="44" fill="rgba(215,95,75,0.10)" filter="url(#soft)"/>
      <ellipse cx="640" cy="590" rx="62" ry="44" fill="rgba(215,95,75,0.10)" filter="url(#soft)"/>

      <!-- Forehead / hairline transition shadow -->
      <ellipse cx="480" cy="280" rx="245" ry="55" fill="rgba(110,55,18,0.22)" filter="url(#soft)"/>

      <!-- ══ EYEBROWS ══ -->
      <path d="M322 368 Q355 345 402 350" stroke="#221008" stroke-width="10" fill="none" stroke-linecap="round" filter="url(#lash)"/>
      <path d="M558 350 Q605 345 638 368" stroke="#221008" stroke-width="10" fill="none" stroke-linecap="round" filter="url(#lash)"/>
      <!-- Brow arch highlight -->
      <path d="M324 370 Q355 347 400 352" stroke="rgba(180,110,50,0.18)" stroke-width="5" fill="none" stroke-linecap="round"/>

      <!-- ══ EYES ══ -->
      <!-- Eye socket shadows -->
      <ellipse cx="368" cy="422" rx="58" ry="34" fill="rgba(110,55,16,0.26)"/>
      <ellipse cx="592" cy="422" rx="58" ry="34" fill="rgba(110,55,16,0.26)"/>

      <!-- Sclera (whites) — almond shape -->
      <clipPath id="lcl"><path d="M318 422 Q368 396 418 422 Q368 448 318 422 Z"/></clipPath>
      <clipPath id="rcl"><path d="M542 422 Q592 396 642 422 Q592 448 542 422 Z"/></clipPath>

      <path d="M318 422 Q368 396 418 422 Q368 448 318 422 Z" fill="#F4EDE5"/>
      <path d="M542 422 Q592 396 642 422 Q592 448 542 422 Z" fill="#F4EDE5"/>

      <!-- Irises -->
      <circle cx="368" cy="422" r="23" fill="url(#irisG)" clip-path="url(#lcl)"/>
      <circle cx="592" cy="422" r="23" fill="url(#irisG)" clip-path="url(#rcl)"/>
      <!-- Pupils -->
      <circle cx="368" cy="422" r="13" fill="#0A0504" clip-path="url(#lcl)"/>
      <circle cx="592" cy="422" r="13" fill="#0A0504" clip-path="url(#rcl)"/>
      <!-- Iris ring detail -->
      <circle cx="368" cy="422" r="22" fill="none" stroke="rgba(20,8,2,0.5)" stroke-width="1.5" clip-path="url(#lcl)"/>
      <circle cx="592" cy="422" r="22" fill="none" stroke="rgba(20,8,2,0.5)" stroke-width="1.5" clip-path="url(#rcl)"/>

      <!-- Catch lights (realistic dual catch-light from street + sky) -->
      <circle cx="376" cy="414" r="5.5" fill="rgba(255,255,255,0.90)" clip-path="url(#lcl)"/>
      <circle cx="600" cy="414" r="5.5" fill="rgba(255,255,255,0.90)" clip-path="url(#rcl)"/>
      <circle cx="360" cy="430" r="3"   fill="rgba(255,220,160,0.45)" clip-path="url(#lcl)"/>
      <circle cx="584" cy="430" r="3"   fill="rgba(255,220,160,0.45)" clip-path="url(#rcl)"/>

      <!-- Upper eyelid crease -->
      <path d="M318 422 Q368 393 418 422" stroke="rgba(80,35,10,0.55)" stroke-width="2.5" fill="none" filter="url(#lash)"/>
      <path d="M542 422 Q592 393 642 422" stroke="rgba(80,35,10,0.55)" stroke-width="2.5" fill="none" filter="url(#lash)"/>
      <!-- Upper lid line / lash root -->
      <path d="M320 422 Q368 396 416 422" stroke="#140804" stroke-width="3.8" fill="none" filter="url(#lash)"/>
      <path d="M544 422 Q592 396 640 422" stroke="#140804" stroke-width="3.8" fill="none" filter="url(#lash)"/>
      <!-- Lower lid line -->
      <path d="M322 422 Q368 444 414 422" stroke="rgba(80,40,15,0.28)" stroke-width="1.8" fill="none"/>
      <path d="M546 422 Q592 444 638 422" stroke="rgba(80,40,15,0.28)" stroke-width="1.8" fill="none"/>

      <!-- ══ NOSE ══ -->
      <!-- Bridge shadow (subtle) -->
      <path d="M452 386 Q442 430 440 480 Q450 496 480 498 Q510 496 520 480 Q518 430 508 386"
            fill="rgba(170,95,42,0.06)"/>
      <!-- Nose tip highlight -->
      <ellipse cx="480" cy="486" rx="22" ry="14" fill="rgba(255,230,200,0.20)" filter="url(#soft)"/>
      <!-- Nostrils -->
      <ellipse cx="452" cy="494" rx="17" ry="11" fill="rgba(130,62,22,0.28)" transform="rotate(-15,452,494)"/>
      <ellipse cx="508" cy="494" rx="17" ry="11" fill="rgba(130,62,22,0.28)" transform="rotate(15,508,494)"/>
      <!-- Subtle nose wing -->
      <path d="M438 488 Q442 498 452 502" stroke="rgba(140,70,30,0.22)" stroke-width="2" fill="none"/>
      <path d="M522 488 Q518 498 508 502" stroke="rgba(140,70,30,0.22)" stroke-width="2" fill="none"/>

      <!-- ══ PHILTRUM shadow ══ -->
      <path d="M466 500 Q480 512 494 500" stroke="rgba(150,80,35,0.15)" stroke-width="2" fill="none"/>

      <!-- ══ LIPS ══ -->
      <!-- Lower lip (fuller volume) -->
      <path d="M380 578 Q420 614 480 618 Q540 614 580 578 Q550 602 480 606 Q410 602 380 578 Z"
            fill="#D88484"/>
      <!-- Lower lip highlight -->
      <ellipse cx="480" cy="598" rx="42" ry="10" fill="rgba(255,210,190,0.32)" filter="url(#soft)"/>
      <!-- Upper lip -->
      <path d="M380 578 Q404 565 432 568 Q480 558 528 568 Q556 565 580 578 Q550 572 480 574 Q410 572 380 578 Z"
            fill="url(#lipG)"/>
      <!-- Cupid bow definition -->
      <path d="M432 568 Q456 558 480 558 Q504 558 528 568" stroke="rgba(150,60,60,0.35)" stroke-width="1.8" fill="none"/>
      <!-- Lip line -->
      <path d="M380 578 Q432 576 480 576 Q528 576 580 578" stroke="rgba(160,70,70,0.45)" stroke-width="1.5" fill="none"/>
      <!-- Corner shadows -->
      <ellipse cx="380" cy="578" rx="8" ry="6" fill="rgba(100,40,30,0.35)"/>
      <ellipse cx="580" cy="578" rx="8" ry="6" fill="rgba(100,40,30,0.35)"/>

      <!-- ══ JAW / CHIN ══ -->
      <!-- Chin highlight -->
      <ellipse cx="480" cy="790" rx="32" ry="18" fill="rgba(255,235,205,0.16)" filter="url(#soft)"/>
      <!-- Under-chin shadow -->
      <ellipse cx="480" cy="820" rx="160" ry="38" fill="rgba(50,20,5,0.38)" filter="url(#soft)"/>

      <!-- ══ HAIR (FRONT sides) ══ -->
      <!-- Left hair fall -->
      <path d="M244 195 Q180 360 188 580 Q182 750 210 920 Q220 1060 255 1150"
            stroke="#110804" stroke-width="65" fill="none" stroke-linecap="round" opacity="0.97"/>
      <path d="M248 200 Q178 370 184 590 Q177 760 205 930"
            stroke="#241208" stroke-width="36" fill="none" stroke-linecap="round" opacity="0.75"/>
      <!-- Loose strand L -->
      <path d="M290 260 Q250 380 258 540 Q262 640 270 720"
            stroke="#1A0C06" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.55"/>

      <!-- Right hair fall -->
      <path d="M716 195 Q780 360 772 580 Q778 750 750 920 Q740 1060 705 1150"
            stroke="#110804" stroke-width="65" fill="none" stroke-linecap="round" opacity="0.97"/>
      <path d="M712 200 Q782 370 776 590 Q783 760 755 930"
            stroke="#241208" stroke-width="36" fill="none" stroke-linecap="round" opacity="0.75"/>
      <!-- Loose strand R -->
      <path d="M670 260 Q710 380 702 540 Q698 640 690 720"
            stroke="#1A0C06" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.55"/>

      <!-- Hair top / crown -->
      <path d="M244 195 Q320 125 480 110 Q640 125 716 195 Q640 175 480 172 Q320 175 244 195 Z"
            fill="#110804"/>
      <!-- Crown highlight -->
      <path d="M370 145 Q440 120 510 140"
            stroke="rgba(70,35,8,0.42)" stroke-width="18" fill="none" stroke-linecap="round" filter="url(#soft)"/>
      <path d="M380 148 Q440 126 500 143"
            stroke="rgba(120,60,15,0.18)" stroke-width="8" fill="none" stroke-linecap="round" filter="url(#soft)"/>

      <!-- ══ EARLOBE hints (subtle) ══ -->
      <ellipse cx="234" cy="540" rx="18" ry="24" fill="#D4986A" opacity="0.55"/>
      <ellipse cx="726" cy="540" rx="18" ry="24" fill="#D4986A" opacity="0.55"/>
    </svg>
  </div>

  <div id="vig"></div>
  <div id="grain"></div>

  <!-- "Hi" caption -->
  <div id="cap">Hi</div>

  <!-- Audio -->
  <audio id="hi-aud" data-start="2.05" data-duration="0.9" data-track-index="0"
         src="hi.wav" data-volume="1"></audio>

</div>

<script>
window.__timelines = window.__timelines || {};
var tl = gsap.timeline({ paused: true });

// ── PORTRAIT: fade in + very slow cinematic push-in ──────────
tl.from('#portrait', { opacity: 0, duration: 0.5, ease: 'power2.out' }, 0);
tl.to('#portrait',   { scale: 1.022, duration: 3.2, ease: 'power1.inOut', transformOrigin: '50% 40%' }, 0);

// ── MICRO HEAD TILT (breathing feel) ─────────────────────────
tl.to('#portrait svg', { rotation: 0.45, duration: 1.5, ease: 'sine.inOut', transformOrigin: '50% 44%' }, 0.3);
tl.to('#portrait svg', { rotation: 0.0,  duration: 1.5, ease: 'sine.inOut', transformOrigin: '50% 44%' }, 1.8);

// ── BOKEH AMBIENT DRIFT ───────────────────────────────────────
tl.to('#b1',  { x:  9, y: -6,  duration: 3.2, ease: 'sine.inOut' }, 0);
tl.to('#b2',  { x: -7, y:  5,  duration: 3.2, ease: 'sine.inOut' }, 0);
tl.to('#b6',  { x:  5, y: -9,  duration: 3.2, ease: 'sine.inOut' }, 0);
tl.to('#b7',  { x: -6, y:  7,  duration: 3.2, ease: 'sine.inOut' }, 0);
tl.to('#b11', { x:  7, y: -5,  duration: 2.8, ease: 'sine.inOut' }, 0);
tl.to('#b14', { x: -4, y:  6,  duration: 2.6, ease: 'sine.inOut' }, 0);
tl.to('#b15', { x:  5, y: -4,  duration: 2.9, ease: 'sine.inOut' }, 0);

// ── "Hi" CAPTION at ~2.1s ────────────────────────────────────
tl.set('#cap', { visibility: 'visible', opacity: 0, scale: 1.32, y: 20 }, 2.08);
tl.to('#cap',  { opacity: 1, scale: 1, y: 0, duration: 0.14, ease: 'back.out(1.9)' }, 2.10);
tl.to('#cap',  { opacity: 0, scale: 0.92, y: -14, duration: 0.12, ease: 'power2.in' }, 2.74);
tl.set('#cap', { opacity: 0, visibility: 'hidden' }, 2.86);

// ── FINAL FADE (last scene only) ─────────────────────────────
tl.to('#root', { opacity: 0, duration: 0.28, ease: 'power2.in' }, 2.94);

window.__timelines['main'] = tl;
</script>
</body>
</html>
